<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap');
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.promo{position:relative;width:360px;height:334px;border-radius:22px;overflow:hidden;background:linear-gradient(165deg,#1E40AF,#1A56DB 70%);box-shadow:0 14px 32px rgba(15,32,80,.35);font-family:'Poppins',sans-serif}
.abs{position:absolute}
.bob{animation:bob 2.4s ease-in-out infinite}
.floaty{animation:floaty 3.4s ease-in-out infinite}
.spin{animation:spin 6s linear infinite}
.cta{display:inline-flex;align-items:center;gap:7px;background:#16A34A;color:#fff;font-weight:700;font-size:15px;padding:11px 22px;border-radius:999px;box-shadow:0 7px 16px rgba(0,0,0,.3);animation:pulse 1.8s ease-in-out infinite}
.flag{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent}
.badge{width:44px;height:44px;border-radius:50%;background:#16A34A;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;box-shadow:0 4px 10px rgba(0,0,0,.25)}
.spark{width:10px;height:10px;background:#FDBA2D;transform:rotate(45deg);border-radius:2px}
.shine{position:absolute;top:0;left:-45%;width:35%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-18deg);animation:shine 4.5s ease-in-out infinite;pointer-events:none}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-9px) rotate(8deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shine{0%{left:-45%}55%,100%{left:130%}}
@keyframes sway{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2.5deg)}}
@keyframes drift{0%{transform:translateY(-6px)}100%{transform:translateY(10px)}}
</style>
